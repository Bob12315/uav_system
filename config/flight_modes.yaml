input_adapter:
  dt_default: 0.02
  dt_min: 0.001
  dt_max: 0.5
  stable_hold_s: 0.3
  age_invalid_value: .inf
  ex_cam_tau_s: 0.08
  ey_cam_tau_s: 0.08
  ex_body_tau_s: 0.08
  ey_body_tau_s: 0.08
  gimbal_yaw_tau_s: 0.10
  gimbal_pitch_tau_s: 0.10
  target_size_tau_s: 0.12

approach_track:
  gates:
    require_target_locked_for_body: true
    require_target_stable_for_approach: true
    require_yaw_aligned_for_approach: true
    yaw_align_thresh_rad: 0.35
    require_gimbal_fresh_for_gimbal: false
    require_gimbal_fresh_for_body: true
    require_gimbal_fresh_for_approach: true

  gimbal:
    kp_yaw: 5.0
    kp_pitch: 3.8
    ki_yaw: 0.02
    ki_pitch: 0.03
    kd_yaw: 0.2
    kd_pitch: 0.12
    use_derivative: true
    deadband_x: 0.02
    deadband_y: 0.02
    integral_limit: 0.25
    max_yaw_rate: 20.0
    max_pitch_rate: 1.2
    yaw_sign: 1.0
    pitch_sign: -1.0

  body:
    kp_vy: 0.2
    kd_vy: 0.0
    use_derivative_vy: true
    kp_yaw: 0.2
    kd_yaw: 0.01
    use_derivative_yaw: false
    yaw_rate_damping: 0.8
    deadband_ex_body: 0.02
    deadband_gimbal_yaw: 0.02
    max_vy: 0.3
    max_yaw_rate: 0.3
    vy_sign: 1.0
    yaw_sign: 1.0

  forward:
    target_size_ref: 0.2
    kp_vx: 2.0
    kd_vx: 0.6
    use_derivative: true
    deadband_size: 0.01
    max_forward_vx: 0.5
    max_backward_vx: 0.1
    allow_backward: true
    min_valid_target_size: 0.1
    vx_sign: 1.0

overhead_hold:
  gates:
    require_gimbal_fresh_for_gimbal: false
    require_gimbal_fresh_for_body: true
    require_gimbal_fresh_for_approach: true

  gimbal:
    downward_pitch_rad: -1.5707963267948966
    pitch_tolerance_rad: 0.03

  lateral:
    kp_vy: 3.0
    kd_vy: 1.0
    use_derivative: true
    deadband_ex_cam: 0.02
    max_vy: 1.0
    vy_sign: 1.0

  longitudinal:
    kp_vx: 3.0
    kd_vx: 1.0
    use_derivative: true
    deadband_ey_cam: 0.02
    max_forward_vx: 2.0
    max_backward_vx: 2.0
    allow_backward: true
    vx_sign: -1.0

shaper:
  max_vx: 3.0
  max_vy: 1.0
  max_vz: 0.5
  max_yaw_rate: 1.0
  max_gimbal_yaw_rate: 1.0
  max_gimbal_pitch_rate: 1.0
  max_vx_rate: 2.0
  max_vy_rate: 1.5
  max_vz_rate: 1.0
  max_yaw_rate_rate: 2.0
  max_gimbal_yaw_rate_rate: 3.0
  max_gimbal_pitch_rate_rate: 3.0
  smooth_to_zero_when_disabled: true
