input_adapter:
  dt_default: 0.02
  dt_min: 0.001
  dt_max: 0.5
  stable_hold_s: 0.3
  age_invalid_value: .inf
  ex_cam_tau_s: 0.08
  ey_cam_tau_s: 0.08
  ex_body_tau_s: 0.08
  ey_body_tau_s: 0.08
  gimbal_yaw_tau_s: 0.10
  gimbal_pitch_tau_s: 0.10
  target_size_tau_s: 0.12

approach_track:
  gates:
    require_target_locked_for_body: true        # 机体 yaw 跟随前要求目标已锁定
    require_target_stable_for_approach: false   # 调试：前进前不等待目标稳定
    require_yaw_aligned_for_approach: false     # 调试：前进前不等待云台 yaw 回中
    yaw_align_thresh_rad: 0.35                  # 兼容旧配置的 yaw 对齐阈值
    yaw_align_enter_thresh_rad: 0.15            # 进入 APPROACHING 的云台 yaw 阈值，越小越保守
    yaw_align_exit_thresh_rad: 0.30             # 退出 APPROACHING 的云台 yaw 阈值，需大于进入阈值
    yaw_align_hold_s: 0.4                       # yaw 连续对齐多久后才允许前进
    min_yaw_quality: 1.0                        # 调试：不因云台 yaw 偏差缩小前进速度
    require_gimbal_fresh_for_gimbal: false      # 云台追踪是否强制要求云台遥测新鲜
    require_gimbal_fresh_for_body: true         # 机体 yaw 是否强制要求云台遥测新鲜
    require_gimbal_fresh_for_approach: false    # 调试：前进不强制等待云台遥测新鲜

  gimbal:
    kp_yaw: 5.0                                 # 云台 yaw 比例增益，越大越快但更易抖
    kp_pitch: 1.8                               # 云台 pitch 比例增益
    ki_yaw: 0.02                                # 云台 yaw 积分增益，用于消除小的长期偏差
    ki_pitch: 0.0                               # 云台 pitch 积分增益，0 表示关闭
    use_derivative: false                       # 是否启用云台误差 D 项，视觉噪声大时建议关闭
    deadband_x: 0.02                            # 图像横向误差死区，小于该值不修正 yaw
    deadband_y: 0.04                            # 图像纵向误差死区，小于该值不修正 pitch
    center_hold_pitch_threshold: 0.04           # pitch 近中心保持阈值，进入后清积分并输出 0
    integral_limit: 0.25                        # 云台积分限幅，防止积分累积过大
    max_yaw_rate: 1.0                           # 云台 yaw 最大角速度 rad/s
    max_pitch_rate: 0.5                         # 云台 pitch 最大角速度 rad/s
    yaw_sign: 1.0                               # 云台 yaw 方向符号，方向反了改成 -1
    pitch_sign: -1.0                            # 云台 pitch 方向符号，方向反了改成 1

  body:
    kp_yaw: 0.2                                 # 机体 yaw 跟随云台 yaw 的比例增益
    kp_ex_cam_yaw: 0.4                          # 图像横向误差给机体 yaw 的提前转向增益
    yaw_rate_damping: 0.8                       # 用实际 yaw_rate 做阻尼，减小延迟过冲
    yaw_step_rate: 0.00                         # yaw 指令量化步长，0 表示不量化
    deadband_gimbal_yaw: 0.03                   # 云台 yaw 死区，小偏角不转机体
    max_yaw_rate: 0.3                           # 机体 yaw 最大角速度 rad/s
    yaw_sign: 1.0                               # 机体 yaw 方向符号，方向反了改成 -1

  forward:
    target_size_ref: 0.6                        # 调试：提高期望尺寸，让当前距离更容易产生前进 vx
    kp_vx: 4.0                                  # 前进比例增益，越大接近越积极
    deadband_size: 0.0                          # 调试：取消尺寸死区，便于观察小的 vx 输出
    ex_cam_slowdown_start: 999.0                # 调试：基本不因横向偏差降低前进速度
    max_ex_cam_for_approach: 999.0              # 调试：基本不因横向偏差停止前进
    max_forward_vx: 0.8                         # 最大前进速度 m/s
    max_backward_vx: 0.5                        # 调试：允许目标过大时以较保守速度后退
    allow_backward: true                        # 调试：target_size 超过期望尺寸时允许输出负 vx
    min_valid_target_size: 0                 # 小于该尺寸认为目标尺寸无效
    vx_sign: 1.0                                # 前进方向符号，方向反了改成 -1

overhead_hold:
  gates:
    require_gimbal_fresh_for_gimbal: false
    require_gimbal_fresh_for_body: true
    require_gimbal_fresh_for_approach: true

  gimbal:
    downward_pitch_rad: -1.5707963267948966
    pitch_tolerance_rad: 0.03

  lateral:
    kp_vy: 3.0
    kd_vy: 1.0
    use_derivative: true
    deadband_ex_cam: 0.02
    max_vy: 1.0
    vy_sign: 1.0

  longitudinal:
    kp_vx: 3.0
    kd_vx: 1.0
    use_derivative: true
    deadband_ey_cam: 0.02
    max_forward_vx: 2.0
    max_backward_vx: 2.0
    allow_backward: true
    vx_sign: -1.0

shaper:
  max_vx: 3.0
  max_vy: 1.0
  max_vz: 0.5
  max_yaw_rate: 1.0
  max_gimbal_yaw_rate: 1.0
  max_gimbal_pitch_rate: 1.0
  max_vx_rate: 2.0
  max_vy_rate: 1.5
  max_vz_rate: 1.0
  max_yaw_rate_rate: 2.0
  max_gimbal_yaw_rate_rate: 3.0
  max_gimbal_pitch_rate_rate: 3.0
  smooth_to_zero_when_disabled: true
